<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c0c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Upcoming" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>Upcoming</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="splash-active">
  <!-- Splash / loading screen -->
  <div id="splash" class="splash">
    <div class="spinner"></div>
  </div>

  <main class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">▶</span>
        <h1 class="brand-title">Upcoming</h1>
      </div>
      <div class="topbar-actions">
        <button id="addBtn" class="btn-add" aria-label="Add event" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
        </button>
        <button id="devBtn" class="btn-dev" aria-label="Developer access">Dev</button>
      </div>
    </header>

    <!-- Hero: next up -->
    <section id="hero" class="hero" hidden>
      <div id="heroPoster" class="hero-poster"></div>
      <div class="hero-shade"></div>
      <div class="hero-content">
        <span class="hero-kicker"><span id="heroEmoji" class="hero-emoji">🎬</span> Next up</span>
        <h2 id="heroTitle" class="hero-title">—</h2>
        <p id="heroMeta" class="hero-meta">—</p>
        <div id="countdown" class="countdown">
          <div class="cd"><b id="cdDays">0</b><i>days</i></div>
          <div class="cd"><b id="cdHours">0</b><i>hrs</i></div>
          <div class="cd"><b id="cdMins">0</b><i>min</i></div>
          <div class="cd"><b id="cdSecs">0</b><i>sec</i></div>
        </div>
      </div>
    </section>

    <!-- Events list -->
    <section class="listing">
      <div class="listing-head">
        <h3>All events</h3>
        <span id="countBadge" class="count-badge"></span>
      </div>
      <ul id="list" class="list"></ul>
      <div id="empty" class="empty" hidden>
        <span>🎬</span>
        <p>No upcoming events right now.</p>
      </div>
    </section>
  </main>

  <!-- Add / edit event sheet -->
  <div id="sheet" class="sheet-backdrop" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Add event">
      <div class="sheet-grab"></div>
      <h2 class="sheet-title" id="sheetTitle">New event</h2>
      <form id="form" class="form">
        <label class="field movie-search" id="movieSearchWrap">
          <span>Search movie <span class="hint">(TMDB)</span></span>
          <input id="movieSearch" type="text" autocomplete="off" placeholder="Type a movie name…" />
          <div id="searchResults" class="search-results" hidden></div>
        </label>
        <label class="field">
          <span>Title</span>
          <input name="title" required placeholder="The Odyssey" />
        </label>
        <div class="field-row">
          <label class="field" style="width:84px">
            <span>Emoji</span>
            <input name="emoji" placeholder="🎬" maxlength="2" />
          </label>
          <label class="field grow">
            <span>Category</span>
            <input name="category" placeholder="Cinema" />
          </label>
        </div>
        <label class="field">
          <span>Location</span>
          <input name="location" placeholder="Optional" />
        </label>
        <label class="field">
          <span>Poster image URL <span class="hint">(optional)</span></span>
          <input name="poster" type="url" placeholder="https://image.tmdb.org/.../poster.jpg" />
        </label>
        <label class="field">
          <span>Date &amp; time</span>
          <input name="date" type="datetime-local" required />
        </label>
        <label class="field">
          <span>Notes</span>
          <textarea name="notes" rows="2" placeholder="Grab tickets early!"></textarea>
        </label>
        <div class="sheet-actions">
          <button type="button" id="cancelBtn" class="btn ghost">Cancel</button>
          <button type="submit" id="submitBtn" class="btn primary">Add event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Dev login sheet -->
  <div id="devSheet" class="sheet-backdrop" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Developer access">
      <div class="sheet-grab"></div>
      <h2 class="sheet-title">Developer access</h2>
      <p class="sheet-sub">Enter the password to add, edit, or remove events.</p>
      <form id="devForm" class="form">
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••" required />
        </label>
        <p id="devError" class="dev-error" hidden>Wrong password. Try again.</p>
        <div class="sheet-actions">
          <button type="button" id="devCancelBtn" class="btn ghost">Cancel</button>
          <button type="submit" class="btn primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Movie detail (full screen) -->
  <div id="detailModal" class="detail-backdrop" hidden>
    <div class="detail" role="dialog" aria-modal="true" aria-label="Event details">
      <button id="detailClose" class="detail-close" aria-label="Close">✕</button>
      <div id="detailHero" class="detail-hero">
        <div id="detailBackdrop" class="detail-backdrop-img"></div>
        <div class="detail-hero-overlay">
          <img id="detailPoster" class="detail-poster" alt="" hidden />
          <div class="detail-head-info">
            <h2 id="detailTitle" class="detail-title">—</h2>
            <p id="detailTagline" class="detail-tagline"></p>
            <div id="detailMeta" class="detail-meta"></div>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div id="detailEventInfo" class="detail-event"></div>
        <div id="detailGenres" class="detail-genres"></div>
        <p id="detailOverview" class="detail-overview"></p>
        <div id="detailCastWrap" class="detail-section" hidden>
          <h3 class="detail-section-title">Cast</h3>
          <div id="detailCast" class="cast-row"></div>
        </div>
        <div id="detailLoading" class="detail-loading" hidden>Loading movie details…</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
