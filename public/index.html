<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#05060a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Upcoming" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>Upcoming</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="splash-active">
  <!-- Splash / loading screen -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo">
        <span class="splash-emoji">🎬</span>
      </div>
      <h1 class="splash-title">Upcoming</h1>
      <p class="splash-sub">Events</p>
      <div class="splash-bar"><span></span></div>
    </div>
  </div>

  <main class="app">
    <header class="top">
      <div class="top-row">
        <div>
          <p class="eyebrow"></p>
          <h1 class="title">Upcoming</h1>
        </div>
        <div class="top-actions">
          <button id="addBtn" class="icon-btn" aria-label="Add event" hidden>
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
          <button id="devBtn" class="dev-btn" aria-label="Developer access">Dev</button>
        </div>
      </div>

      <section id="hero" class="hero glass" hidden>
        <div id="heroPoster" class="hero-poster"></div>
        <div class="hero-glow"></div>
        <div class="hero-content">
          <p class="hero-label">Next up</p>
          <div class="hero-main">
            <span id="heroEmoji" class="hero-emoji">🎬</span>
            <div>
              <h2 id="heroTitle" class="hero-title">—</h2>
              <p id="heroMeta" class="hero-meta">—</p>
            </div>
          </div>
          <div id="countdown" class="countdown">
            <div class="unit"><span id="cdDays">0</span><label>days</label></div>
            <div class="unit"><span id="cdHours">0</span><label>hrs</label></div>
            <div class="unit"><span id="cdMins">0</span><label>min</label></div>
            <div class="unit"><span id="cdSecs">0</span><label>sec</label></div>
          </div>
        </div>
      </section>
    </header>

    <section class="list-wrap">
      <h3 class="section-head">All events</h3>
      <ul id="list" class="list"></ul>
      <div id="empty" class="empty glass" hidden>
        <span>📭</span>
        <p>No upcoming events right now. Check back soon.</p>
      </div>
    </section>
  </main>

  <!-- Add event sheet (dev only) -->
  <div id="sheet" class="sheet-backdrop" hidden>
    <div class="sheet glass" role="dialog" aria-modal="true" aria-label="Add event">
      <div class="sheet-grab"></div>
      <h2 class="sheet-title" id="sheetTitle">New event</h2>
      <form id="form" class="form">
        <label class="field">
          <span>Title</span>
          <input name="title" required placeholder="The Odyssey" />
        </label>
        <div class="field-row">
          <label class="field">
            <span>Emoji</span>
            <input name="emoji" placeholder="🎬" maxlength="2" />
          </label>
          <label class="field grow">
            <span>Category</span>
            <input name="category" placeholder="Cinema" />
          </label>
        </div>
        <label class="field">
          <span>Location</span>
          <input name="location" placeholder="Local Cinema" />
        </label>
        <label class="field">
          <span>Poster image URL <span class="hint">(optional)</span></span>
          <input name="poster" type="url" placeholder="https://image.tmdb.org/.../poster.jpg" />
        </label>
        <label class="field">
          <span>Date & time</span>
          <input name="date" type="datetime-local" required />
        </label>
        <label class="field">
          <span>Notes</span>
          <textarea name="notes" rows="2" placeholder="Grab tickets early!"></textarea>
        </label>
        <div class="sheet-actions">
          <button type="button" id="cancelBtn" class="btn ghost">Cancel</button>
          <button type="submit" id="submitBtn" class="btn primary">Add event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Dev login sheet -->
  <div id="devSheet" class="sheet-backdrop" hidden>
    <div class="sheet glass" role="dialog" aria-modal="true" aria-label="Developer access">
      <div class="sheet-grab"></div>
      <h2 class="sheet-title">Developer access</h2>
      <p class="sheet-sub">Enter the password to add or remove events.</p>
      <form id="devForm" class="form">
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••" required />
        </label>
        <p id="devError" class="dev-error" hidden>Wrong password. Try again.</p>
        <div class="sheet-actions">
          <button type="button" id="devCancelBtn" class="btn ghost">Cancel</button>
          <button type="submit" class="btn primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
