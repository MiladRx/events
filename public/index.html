<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0b0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Upcoming" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>Upcoming</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash"><div class="spinner"></div></div>

  <!-- Main app -->
  <div class="app">
    <header class="hdr">
      <div>
        <p class="hdr-sub">What we're watching</p>
        <h1 class="hdr-title">Upcoming</h1>
      </div>
      <button id="devBtn" class="dev-btn">Dev</button>
    </header>

    <section id="hero" class="hero" hidden></section>

    <nav class="tabs">
      <button class="tab active" data-tab="upcoming">Upcoming</button>
      <button class="tab" data-tab="past">Past</button>
    </nav>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>
      <div class="empty-icon">🎬</div>
      <p id="emptyText">No upcoming events</p>
    </div>
  </div>

  <!-- FAB -->
  <button id="fab" class="fab" hidden>
    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
  </button>

  <!-- Add/Edit Sheet -->
  <div id="sheet" class="sheet-overlay" hidden>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2 id="sheetTitle" class="sheet-title">New event</h2>
      <form id="form" class="form">
        <div class="field-group movie-search-wrap">
          <label class="label">Search movie <span class="hint">(TMDB)</span></label>
          <input id="movieSearch" type="text" autocomplete="off" placeholder="Type a movie name…" />
          <div id="searchResults" class="search-results" hidden></div>
        </div>
        <div class="field-group">
          <label class="label">Title</label>
          <input name="title" required placeholder="The Odyssey" />
        </div>
        <div class="field-row">
          <div class="field-group" style="width:80px">
            <label class="label">Emoji</label>
            <input name="emoji" placeholder="🎬" maxlength="2" />
          </div>
          <div class="field-group flex-1">
            <label class="label">Category</label>
            <input name="category" placeholder="Cinema" />
          </div>
        </div>
        <div class="field-group">
          <label class="label">Location</label>
          <input name="location" placeholder="Optional" />
        </div>
        <div class="field-group">
          <label class="label">Poster URL <span class="hint">(optional)</span></label>
          <input name="poster" type="url" placeholder="https://image.tmdb.org/.../poster.jpg" />
        </div>
        <div class="field-group">
          <label class="label">Date &amp; time</label>
          <input name="date" type="datetime-local" required />
        </div>
        <div class="field-group">
          <label class="label">Notes</label>
          <textarea name="notes" rows="2" placeholder="Additional details…"></textarea>
        </div>
        <div class="actions">
          <button type="button" id="cancelBtn" class="btn secondary">Cancel</button>
          <button type="submit" id="submitBtn" class="btn primary">Add event</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Dev Sheet -->
  <div id="devSheet" class="sheet-overlay" hidden>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Developer access</h2>
      <p class="sheet-desc">Enter password to manage events</p>
      <form id="devForm" class="form">
        <div class="field-group">
          <label class="label">Password</label>
          <input name="password" type="password" inputmode="numeric" autocomplete="off" placeholder="••••••" required />
        </div>
        <p id="devError" class="error-msg" hidden>Incorrect password</p>
        <div class="actions">
          <button type="button" id="devCancelBtn" class="btn secondary">Cancel</button>
          <button type="submit" class="btn primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail" class="detail" hidden>
    <div class="detail-header">
      <div id="detailBackdrop" class="detail-backdrop"></div>
      <div class="detail-header-overlay"></div>
      <button id="closeDetail" class="detail-close">✕</button>
      <div class="detail-header-content">
        <img id="detailPoster" class="detail-poster" alt="" hidden />
        <div class="detail-info">
          <h2 id="detailTitle" class="detail-title">—</h2>
          <p id="detailTagline" class="detail-tagline"></p>
          <div id="detailMeta" class="detail-meta"></div>
        </div>
      </div>
    </div>

    <div class="detail-content">
      <div id="detailEvent" class="detail-event"></div>
      
      <a id="trailerBtn" class="trailer-btn" target="_blank" rel="noopener" hidden>
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
        Watch trailer
      </a>
      
      <div id="detailGenres" class="genres"></div>
      
      <p id="detailOverview" class="overview"></p>
      
      <div id="castSection" class="cast-section" hidden>
        <h3 class="section-title">Cast</h3>
        <div id="cast" class="cast"></div>
      </div>
      
      <div id="detailLoading" class="loading-msg" hidden>Loading details…</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
